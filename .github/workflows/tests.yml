name: Run Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit and API tests
        env:
          RMS_DATABASE_URL: sqlite:///./test.db
          RMS_SECRET_KEY: github-actions-secret-key
          RMS_ENVIRONMENT: ci
          RMS_CORS_ORIGINS: http://localhost:5173
        run: pytest
